# Render configuration for INSPEC360
# Usando Dockerfile customizado para controle total do build

services:
  - type: web
    name: inspec360
    env: docker
    plan: free
    region: oregon
    dockerfile: ./Dockerfile
    dockerCommand: node backend/src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: '*'
      - key: DATABASE_URL
        fromDatabase:
          name: inspec360-db
          property: connectionString

databases:
  - name: inspec360-db
    plan: free
    engine: postgres
    region: oregon
