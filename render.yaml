services:
  - type: web
    name: inspec360-frontend
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: npm install -g serve && serve -s dist -l 3000
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

  - type: web
    name: inspec360-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install --no-optional --legacy-peer-deps
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: CORS_ORIGIN
        value: https://inspec360-frontend.onrender.com
