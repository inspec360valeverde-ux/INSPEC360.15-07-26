# Render configuration for INSPEC360
# This setup uses a single web service that builds the frontend and starts the backend.

services:
  - type: web
    name: inspec360
    env: node
    plan: free
    region: oregon
    buildCommand: |
      pnpm run build:render
    startCommand: pnpm run start:backend
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: inspec360-db
          property: connectionString

databases:
  - name: inspec360-db
    plan: free
    engine: postgres
    region: oregon

# Notes:
# - After deployment, set the frontend API URL if you split frontend/backend into different domains.
# - For a single-service deployment, the app uses /api automatically.
