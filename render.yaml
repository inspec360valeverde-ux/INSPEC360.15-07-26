services:
  - type: web
    name: inspec360-backend
    runtime: node
    plan: free
    buildCommand: npm install --force && npm run build && cd backend && npm install --force
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: VITE_API_URL
        value: /api
